<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DO SPORTS 실시간 시간표</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="viewer-page board-style-page">
    <div class="brand-watermark" aria-hidden="true"></div>

    <header class="schedule-header">
      <div class="schedule-brand">
        <h1 id="academyName">DO SPORTS 잠실점 시간표</h1>
        <p id="heroDescription">학부모님이 바로 확인할 수 있는 실시간 반별 시간표입니다.</p>
      </div>
      <div class="schedule-header-actions">
        <div class="status status-card compact-status">
          <span id="liveDot" class="dot"></span>
          <span id="lastUpdated">불러오는 중</span>
        </div>
        <a class="edit-link" href="/admin" target="_blank" rel="noreferrer">✎ 편집</a>
      </div>
    </header>

    <main class="board-shell">
      <section class="connection-warning" id="connectionWarning" hidden></section>

      <section class="notice-bar" aria-label="공지사항">
        <strong>📢 공지</strong>
        <p id="notice">시간표는 수시로 변경될 수 있습니다. 장소와 정원 현황을 꼭 확인해 주세요.</p>
      </section>

      <section class="quick-link-row" aria-label="상담 및 신청 링크">
        <a id="openingLink" class="quick-link" href="https://classroute-site.netlify.app/" target="_blank" rel="noreferrer">개설 희망</a>
        <a id="gatheringLink" class="quick-link" href="https://classroute-site.netlify.app/" target="_blank" rel="noreferrer">반 모으기</a>
        <a id="counselLink" class="quick-link primary" href="https://dosportslink.netlify.app/" target="_blank" rel="noreferrer">상담 및 신청서 작성</a>
      </section>

      <h2 id="heroTitle" class="schedule-main-title">농구 · 축구 · 키즈 수업을 한눈에 보는 시간표</h2>

      <nav class="category-tabs board-tabs" id="categoryTabs" aria-label="종목 선택"></nav>
      <section class="schedule-board" id="scheduleBoard" aria-live="polite"></section>
      <section class="empty" id="emptyState" hidden>
        등록된 수업이 없습니다. 관리자 화면에서 시간표를 추가해 주세요.
      </section>
    </main>

    <script src="/viewer.js"></script>
  </body>
</html>
